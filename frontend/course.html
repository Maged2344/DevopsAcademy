        }
        .course-detail-hero::before {
            content: '';

        .course-detail-hero .badge {

            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: 0.5px;

        .course-detail-hero .badge.intermediate { background: #f59e0b; }
        .course-detail-hero .badge.advanced { background: #ef4444; }
        .course-detail-hero .badge.program { background: linear-gradient(135deg, #8b5cf6, #6366f1); }

        }

        }

        .roadmap-timeline { position: relative; max-width: 850px; margin: 0 auto; }
        .roadmap-timeline::before {
            content: ''; position: absolute; left: 50%; top: 0; bottom: 0;
            width: 4px; background: linear-gradient(180deg, #1e40af, #8b5cf6, #10b981);
            transform: translateX(-50%); border-radius: 2px;
        }
        .roadmap-item {
            display: flex; margin-bottom: 36px; position: relative;

        .roadmap-item .roadmap-content {
            width: 44%; background: #fff; padding: 24px 28px;
            border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border: 1px solid #f1f5f9;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .roadmap-item .roadmap-content:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(30,64,175,0.1);
        }
        .roadmap-item .roadmap-dot {
            position: absolute; left: 50%; top: 24px; width: 20px; height: 20px;
            background: #1e40af; border-radius: 50%; transform: translateX(-50%);
            border: 4px solid #fff; box-shadow: 0 0 0 3px #1e40af;
            z-index: 1;
        }
        .roadmap-content .phase-badge {
            display: inline-block; padding: 3px 10px; border-radius: 4px;
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.5px; margin-bottom: 8px;
            background: #eff6ff; color: #1e40af;
        }
        .roadmap-content h4 { color: #1e293b; margin-bottom: 4px; font-size: 1.05rem; }
        .roadmap-content .roadmap-hours { font-size: 0.8rem; color: #64748b; margin-bottom: 10px; }
        .roadmap-content p { font-size: 0.85rem; color: #475569; line-height: 1.6; }

        /* Who is this for */
        .who-section { padding: 70px 0; background: #fff; }
        .who-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px; margin-top: 32px;
        }
        .who-card {
            padding: 24px; border-radius: 12px; border: 1px solid #e2e8f0;
            transition: border-color 0.3s;
        }
        .who-card:hover { border-color: #3b82f6; }
        .who-card h4 { color: #1e293b; margin-bottom: 8px; }
        .who-card p { font-size: 0.88rem; color: #64748b; line-height: 1.6; }

        .back-link {
            display: inline-flex; align-items: center; gap: 8px; color: #fff;
            text-decoration: none; margin-bottom: 16px; opacity: 0.8;
            font-size: 0.9rem; transition: opacity 0.2s;
        }
        .back-link:hover { opacity: 1; }

        @media (max-width: 768px) {
            .course-grid { grid-template-columns: 1fr; }
            .course-sidebar { position: static; }
            .course-detail-hero h1 { font-size: 2rem; }
            .course-detail-hero { padding: 110px 0 50px; }
            .roadmap-timeline::before { left: 20px; }
            .roadmap-item, .roadmap-item:nth-child(odd) { flex-direction: row; padding-left: 50px; }
            .roadmap-item .roadmap-content { width: 100%; }
            .roadmap-item .roadmap-dot { left: 20px; }
            .highlights-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* Capstone Architecture Diagram */
        .capstone-section { padding: 80px 0; background: #0f172a; color: #fff; }
        .capstone-section h2 { text-align: center; font-size: 2rem; margin-bottom: 12px; color: #fff; }
        .capstone-section .capstone-subtitle { text-align: center; color: rgba(255,255,255,0.7); margin-bottom: 48px; }
        .arch-diagram-wrapper {
            max-width: 1100px; margin: 0 auto; padding: 20px;
            overflow-x: auto;
        }
        .arch-diagram {
            width: 100%; min-width: 900px; height: auto;
        }
        .arch-diagram text { font-family: 'Poppins', sans-serif; }

        @media (max-width: 768px) {
            .arch-diagram-wrapper { padding: 10px; }
            .arch-diagram { min-width: 700px; }
        }
    </style>
