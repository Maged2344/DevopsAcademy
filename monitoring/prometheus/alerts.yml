groups:
  - name: vm_alerts
    rules:
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 80% for 5 minutes (current: {{ $value | printf \"%.1f\" }}%)"

      - alert: CriticalCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 95% for 2 minutes (current: {{ $value | printf \"%.1f\" }}%)"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 85% (current: {{ $value | printf \"%.1f\" }}%)"

      - alert: CriticalMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 95% (current: {{ $value | printf \"%.1f\" }}%)"

      - alert: DiskSpaceLow
        expr: (1 - (node_filesystem_avail_bytes{fstype!="tmpfs"} / node_filesystem_size_bytes{fstype!="tmpfs"})) * 100 > 85
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk space low on {{ $labels.instance }}"
          description: "Disk usage is above 85% on {{ $labels.mountpoint }} (current: {{ $value | printf \"%.1f\" }}%)"

      - alert: DiskWillFillIn24Hours
        expr: predict_linear(node_filesystem_avail_bytes{fstype!="tmpfs"}[6h], 24*3600) < 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Disk will fill within 24 hours on {{ $labels.instance }}"
          description: "Based on current write rate, disk {{ $labels.mountpoint }} will be full in less than 24 hours."

      - alert: HighNetworkTraffic
        expr: rate(node_network_receive_bytes_total{device!="lo"}[5m]) > 100000000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High network receive traffic on {{ $labels.instance }}"
          description: "Network receive rate on {{ $labels.device }} exceeds 100 MB/s"

      - alert: HighDiskIOUtilization
        expr: rate(node_disk_io_time_seconds_total[5m]) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High disk I/O utilization on {{ $labels.instance }}"
          description: "Disk {{ $labels.device }} I/O utilization is above 90%"

      - alert: HighLoadAverage
        expr: node_load15 / count without(cpu, mode) (node_cpu_seconds_total{mode="idle"}) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High load average on {{ $labels.instance }}"
          description: "15-minute load average per CPU is above 2 (current: {{ $value | printf \"%.2f\" }})"

      - alert: HighSwapUsage
        expr: (node_memory_SwapTotal_bytes - node_memory_SwapFree_bytes) / node_memory_SwapTotal_bytes * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High swap usage on {{ $labels.instance }}"
          description: "Swap usage is above 80% (current: {{ $value | printf \"%.1f\" }}%)"

      - alert: SystemdServiceFailed
        expr: node_systemd_unit_state{state="failed"} == 1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Systemd service failed on {{ $labels.instance }}"
          description: "Service {{ $labels.name }} has entered failed state."

  - name: app_alerts
    rules:
      - alert: BackendDown
        expr: up{job="backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend is down"
          description: "The DevOps Academy backend has been unreachable for 1 minute."

      - alert: NginxDown
        expr: up{job="nginx"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Nginx is down"
          description: "Nginx exporter has been unreachable for 1 minute."

      - alert: MongoDBDown
        expr: up{job="mongodb"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MongoDB is down"
          description: "MongoDB exporter has been unreachable for 1 minute."

      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High response time"
          description: "95th percentile response time is above 2 seconds (current: {{ $value | printf \"%.2f\" }}s)"

      - alert: HighErrorRate
        expr: sum(rate(devopsacademy_errors_total{type="server_error"}[5m])) / sum(rate(http_requests_total[5m])) * 100 > 5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High server error rate"
          description: "More than 5% of requests are returning 5xx errors."

      - alert: High4xxRate
        expr: sum(rate(http_requests_total{status=~"4.."}[5m])) / sum(rate(http_requests_total[5m])) * 100 > 25
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High client error rate"
          description: "More than 25% of requests are returning 4xx errors."

      - alert: NoTraffic
        expr: sum(rate(http_requests_total[10m])) == 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "No traffic to backend"
          description: "Backend has received zero requests for 15 minutes."

      - alert: HighActiveConnections
        expr: http_active_connections > 500
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High active connections"
          description: "More than 500 concurrent connections to the backend."

  - name: container_alerts
    rules:
      - alert: ContainerHighCPU
        expr: rate(container_cpu_usage_seconds_total{name=~"devopsacademy.*"}[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} high CPU"
          description: "Container CPU usage above 80% (current: {{ $value | printf \"%.1f\" }}%)"

      - alert: ContainerHighMemory
        expr: container_memory_usage_bytes{name=~"devopsacademy.*"} / container_spec_memory_limit_bytes{name=~"devopsacademy.*"} * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} high memory"
          description: "Container memory usage above 85% of limit."

      - alert: ContainerRestarting
        expr: increase(container_restart_count{name=~"devopsacademy.*"}[15m]) > 3
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.name }} restarting frequently"
          description: "Container has restarted more than 3 times in 15 minutes."

      - alert: ContainerKilled
        expr: time() - container_last_seen{name=~"devopsacademy.*"} > 60
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.name }} killed/stopped"
          description: "Container has not been seen for over 60 seconds."

  - name: mongodb_alerts
    rules:
      - alert: MongoDBHighConnections
        expr: mongodb_ss_connections{conn_type="current"} > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MongoDB high connection count"
          description: "MongoDB has more than 100 active connections (current: {{ $value }})"

      - alert: MongoDBSlowQueries
        expr: rate(mongodb_ss_opcounters_total{type="query"}[5m]) > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MongoDB high query rate"
          description: "MongoDB is processing more than 1000 queries/sec."

      - alert: MongoDBReplicationLag
        expr: mongodb_mongod_replset_member_optime_date{state="SECONDARY"} - on() mongodb_mongod_replset_member_optime_date{state="PRIMARY"} > 10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "MongoDB replication lag"
          description: "Replication lag exceeds 10 seconds."

