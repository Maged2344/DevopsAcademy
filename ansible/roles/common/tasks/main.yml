---
# Common role - System preparation and hardening

- name: Set timezone
  timezone:
    name: "{{ timezone }}"

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Upgrade all packages
  apt:
    upgrade: dist
    autoremove: yes

- name: Install system packages
  apt:
    name: "{{ system_packages }}"
    state: present

- name: Configure swap file
  block:
    - name: Check if swap exists
      stat:
        path: /swapfile
      register: swap_file

    - name: Create swap file
      command: fallocate -l {{ swap_size }} /swapfile
      when: not swap_file.stat.exists

    - name: Set swap permissions
      file:
        path: /swapfile
        mode: '0600'
      when: not swap_file.stat.exists

    - name: Setup swap area
      command: mkswap /swapfile
      when: not swap_file.stat.exists

    - name: Enable swap
      command: swapon /swapfile
      when: not swap_file.stat.exists

    - name: Add swap to fstab
      lineinfile:
        path: /etc/fstab
        line: '/swapfile none swap sw 0 0'
        state: present

- name: Configure UFW firewall
  block:
    - name: Set UFW default deny incoming
      ufw:
        direction: incoming
        policy: deny

    - name: Set UFW default allow outgoing
      ufw:
        direction: outgoing
        policy: allow

    - name: Allow firewall ports
      ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
      loop: "{{ firewall_allowed_ports }}"

    - name: Enable UFW
      ufw:
        state: enabled

- name: Configure fail2ban
  block:
    - name: Copy fail2ban jail config
      copy:
        dest: /etc/fail2ban/jail.local
        content: |
          [DEFAULT]
          bantime = 3600
          findtime = 600
          maxretry = 5

          [sshd]
          enabled = true
          port = ssh
          filter = sshd
          logpath = /var/log/auth.log
          maxretry = 3
          bantime = 7200
      notify: Restart fail2ban

    - name: Enable fail2ban
      service:
        name: fail2ban
        state: started
        enabled: yes

- name: Configure sysctl for performance
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    sysctl_set: yes
  loop:
    - { key: 'vm.swappiness', value: '10' }
    - { key: 'net.core.somaxconn', value: '65535' }
    - { key: 'net.ipv4.tcp_max_syn_backlog', value: '65535' }
    - { key: 'fs.file-max', value: '2097152' }

- name: Set system limits
  copy:
    dest: /etc/security/limits.d/99-custom.conf
    content: |
      * soft nofile 65535
      * hard nofile 65535
      * soft nproc 65535
      * hard nproc 65535

- name: Create app user group
  group:
    name: "{{ app_user }}"
    state: present

- name: Ensure app user exists
  user:
    name: "{{ app_user }}"
    group: "{{ app_user }}"
    shell: /bin/bash
    create_home: yes
    state: present
