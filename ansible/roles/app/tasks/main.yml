---
# App role - Clone repository and deploy application

- name: Create application directory
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

- name: Clone application repository
  git:
    repo: "{{ git_repo }}"
    dest: "{{ app_dir }}"
    version: "{{ git_branch }}"
    force: yes
  become_user: "{{ app_user }}"

- name: Create .env file
  template:
    src: env.j2
    dest: "{{ app_dir }}/.env"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0600'

- name: Create SSL directory
  file:
    path: "{{ ssl_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0700'

- name: Create data directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'
  loop:
    - "{{ app_dir }}/data"
    - "{{ app_dir }}/data/mongo"
    - "{{ app_dir }}/data/prometheus"
    - "{{ app_dir }}/data/grafana"
    - "{{ app_dir }}/backups"

- name: Build Docker images
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    build: always
    state: present
  become_user: "{{ app_user }}"
  register: compose_build

- name: Start application stack
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    state: present
  become_user: "{{ app_user }}"
  register: compose_up

- name: Display running containers
  command: docker ps --format "table {{'{{'}}.Names{{'}}'}}\t{{'{{'}}.Status{{'}}'}}\t{{'{{'}}.Ports{{'}}'}}"
  register: docker_ps
  changed_when: false

- name: Show container status
  debug:
    msg: "{{ docker_ps.stdout_lines }}"

- name: Wait for application to be healthy
  uri:
    url: "http://localhost:80"
    status_code: [200, 301, 302]
  register: health_check
  retries: 10
  delay: 5
  until: health_check.status in [200, 301, 302]

- name: Create backup script
  copy:
    dest: "{{ app_dir }}/backups/backup.sh"
    mode: '0755'
    owner: "{{ app_user }}"
    content: |
      #!/bin/bash
      # DevOps Academy Backup Script
      BACKUP_DIR="{{ app_dir }}/backups"
      TIMESTAMP=$(date +%Y%m%d_%H%M%S)
      
      # MongoDB backup
      docker exec devopsacademy-mongo mongodump --out /data/backup_${TIMESTAMP}
      docker cp devopsacademy-mongo:/data/backup_${TIMESTAMP} ${BACKUP_DIR}/mongo_${TIMESTAMP}
      docker exec devopsacademy-mongo rm -rf /data/backup_${TIMESTAMP}
      
      # Compress backup
      tar -czf ${BACKUP_DIR}/backup_${TIMESTAMP}.tar.gz -C ${BACKUP_DIR} mongo_${TIMESTAMP}
      rm -rf ${BACKUP_DIR}/mongo_${TIMESTAMP}
      
      # Keep only last 7 days
      find ${BACKUP_DIR} -name "backup_*.tar.gz" -mtime +7 -delete
      
      echo "Backup completed: backup_${TIMESTAMP}.tar.gz"

- name: Setup daily backup cron
  cron:
    name: "DevOps Academy daily backup"
    minute: "0"
    hour: "2"
    job: "{{ app_dir }}/backups/backup.sh >> {{ app_dir }}/backups/backup.log 2>&1"
    user: "{{ app_user }}"
