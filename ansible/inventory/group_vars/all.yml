---
# ============================================================================
# Global Variables
# ============================================================================

# Application
app_name: devopsacademy
app_user: ubuntu
app_dir: "/home/{{ app_user }}/{{ app_name }}"
domain_name: devopsacademy.cloud-stacks.com
git_repo: https://github.com/Maged2344/DevopsAcademy.git
git_branch: main

# Docker
docker_compose_version: "2.27.0"
docker_users:
  - "{{ app_user }}"

# SSL
ssl_enabled: true
ssl_email: admin@devopsacademy.cloud-stacks.com
ssl_dir: "{{ app_dir }}/ssl"

# Monitoring
monitoring_enabled: true
grafana_admin_user: admin
grafana_admin_password: "{{ vault_grafana_password | default('devops2026') }}"
prometheus_retention: "30d"

# Firewall
firewall_allowed_ports:
  - { port: 22, proto: tcp }
  - { port: 80, proto: tcp }
  - { port: 443, proto: tcp }
  - { port: 8080, proto: tcp }   # Jenkins
  - { port: 9090, proto: tcp }   # Prometheus (internal)
  - { port: 3001, proto: tcp }   # Grafana (internal)

# System
timezone: Africa/Cairo
swap_size: 2G
system_packages:
  - curl
  - wget
  - git
  - vim
  - htop
  - net-tools
  - unzip
  - jq
  - tree
  - fail2ban
  - ufw
